<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CRUD System</title>
    <link rel="stylesheet" href="product.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
  </head>
  <body>
    <div class="container">
      <h1>Manage Your Products</h1>
      <div class="inputs">
        <input type="text" id="title" placeholder="Title" />

        <div class="price-box">
          <input
            type="number"
            id="price"
            placeholder="Price"
            onkeyup="getTotal()"
          />
          <input
            type="number"
            id="taxes"
            placeholder="Taxes"
            onkeyup="getTotal()"
          />
          <input
            type="number"
            id="ads"
            placeholder="Ads"
            onkeyup="getTotal()"
          />
          <input
            type="number"
            id="discount"
            placeholder="Discount"
            onkeyup="getTotal()"
          />
          <small id="total"> Total:</small>
        </div>

        <input type="number" id="count" placeholder="Count" />
        <input type="text" id="category" placeholder="Category" />

        <button id="submit">Create</button>
      </div>

      <div class="search">
        <input
          type="text"
          id="search"
          placeholder="Search..."
          onkeyup="searchData(this.value)"
        />
        <div class="btnSearch">
          <button onclick="getSearchMood('searchTitle')">
            Search by Title
          </button>
          <button onclick="getSearchMood('searchCategory')">
            Search by Category
          </button>
        </div>
      </div>

      <button id="deleteAll" onclick="deleteAll()"></button>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Price</th>
            <th>Taxes</th>
            <th>Ads</th>
            <th>Discount</th>
            <th>Total</th>
            <th>Category</th>
            <th>Update</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody id="tbody"></tbody>
      </table>
    </div>

    <script src="product.js"></script>
  </body>
</html>
